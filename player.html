<html lang="en">

<meta name="apple-mobile-web-app-capable" content="yes"/>

<link rel="apple-touch-startup-image" href="icon.png"/>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<link rel="stylesheet" href="style.css"/>
<style>
/* ── Layout ───────────────────────────────────────────────────── */
.player-page{display:flex;flex-direction:column}
@media(min-width:1024px){.player-page{flex-direction:row;gap:24px;padding:16px}}
.player-main{flex:1;min-width:0}
.player-side{width:100%;padding:0 16px 16px}
@media(min-width:1024px){.player-side{width:380px;flex-shrink:0;padding:0}}

/* ── Player Wrapper ───────────────────────────────────────────── */
.player-wrap{
  position:relative;width:100%;background:#000;aspect-ratio:16/9;
  user-select:none;-webkit-user-select:none;
}
@media(min-width:1024px){.player-wrap{border-radius:var(--r);overflow:hidden}}
video{width:100%;height:100%;display:block;background:#000}

/* ── Overlay States ───────────────────────────────────────────── */
.player-loading{
  position:absolute;inset:0;background:rgba(0,0,0,.85);
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:14px;z-index:20;
}
.player-loading p{color:var(--text2);font-size:13px;text-align:center;padding:0 16px}

.player-error{
  position:absolute;inset:0;background:rgba(0,0,0,.92);
  display:none;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;z-index:20;padding:24px;text-align:center;
}
.player-error svg{color:var(--red);width:44px;height:44px}
.player-error p{color:var(--text2);font-size:14px;max-width:300px;white-space:pre-line}
.player-error .err-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:4px}

/* ── Seek Flash Overlay ───────────────────────────────────────── */
.seek-flash{
  position:absolute;top:0;bottom:0;width:38%;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;z-index:18;opacity:0;transition:opacity .2s;
}
.seek-flash.left{left:0;background:radial-gradient(ellipse at 25% 50%,rgba(255,255,255,.15) 0%,transparent 70%)}
.seek-flash.right{right:0;background:radial-gradient(ellipse at 75% 50%,rgba(255,255,255,.15) 0%,transparent 70%)}
.seek-flash.show{opacity:1}
.seek-flash-inner{
  background:rgba(0,0,0,.6);border-radius:50%;
  width:60px;height:60px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1px;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.15);
}
.seek-flash-inner svg{width:22px;height:22px;color:#fff}
.seek-flash-inner span{font-size:9px;color:rgba(255,255,255,.9);font-weight:700;letter-spacing:.04em}

/* ── Controls ─────────────────────────────────────────────────── */
.controls{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.75) 30%,rgba(0,0,0,.95));
  padding:0 10px 8px;
  opacity:0;
  pointer-events:none;
  transition:opacity .3s;
  z-index:15;
}
/* Controls only show when force-show is active — all via JS, no CSS hover tricks */
.controls.force-show{
  opacity:1;
  pointer-events:all;
}
.ctrl-title-bar{
  display:flex;align-items:center;gap:8px;
  padding:10px 2px 8px;
}
.ctrl-title-text{
  font-size:14px;font-weight:600;color:#fff;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  flex:1;min-width:0;
  text-shadow:0 1px 4px rgba(0,0,0,.7);
  letter-spacing:.01em;
}
/* Timestamps row — sits between title and progress bar */
.ctrl-timestamps{
  display:flex;justify-content:space-between;align-items:center;
  padding:0 2px 4px;
}
.ctrl-ts{
  font-size:12px;font-weight:700;color:rgba(255,255,255,.9);
  font-variant-numeric:tabular-nums;letter-spacing:.02em;
  text-shadow:0 1px 3px rgba(0,0,0,.7);
}
.ctrl-ts-cur{color:#fff}
.ctrl-ts-total{color:rgba(255,255,255,.6)}
.ctrl-ts-sep{color:rgba(255,255,255,.35);margin:0 1px;font-weight:400}
/* (visibility is handled entirely by .controls.force-show via JS) */

/* Progress bar */
.progress-bar{
  position:relative;cursor:pointer;
  margin-bottom:10px;touch-action:none;
  /* Tall invisible hit-area so mobile fingers grab it easily */
  padding:10px 0;
}
/* The visible track lives inside ::before so the hit-area stays tall */
.progress-bar::before{
  content:'';position:absolute;left:0;right:0;
  top:50%;transform:translateY(-50%);
  height:4px;background:rgba(255,255,255,.25);
  border-radius:2px;transition:height .15s;
}
.progress-bar:hover::before,
.progress-bar.dragging::before{height:7px}
.progress-buf{
  position:absolute;left:0;top:50%;transform:translateY(-50%);
  height:4px;background:rgba(255,255,255,.35);
  border-radius:2px;pointer-events:none;transition:height .15s;
}
.progress-bar:hover .progress-buf,
.progress-bar.dragging .progress-buf{height:7px}
.progress-fill{
  position:absolute;left:0;top:50%;transform:translateY(-50%);
  height:4px;background:var(--red);
  border-radius:2px;pointer-events:none;transition:height .15s;
}
.progress-bar:hover .progress-fill,
.progress-bar.dragging .progress-fill{height:7px}
.progress-thumb{
  position:absolute;top:50%;
  width:14px;height:14px;
  background:#fff;border-radius:50%;
  transform:translate(-50%,-50%);pointer-events:none;
  opacity:0;transition:opacity .15s,width .1s,height .1s,box-shadow .1s;
}
.progress-bar:hover .progress-thumb,
.progress-bar.dragging .progress-thumb{opacity:1}
.progress-bar.dragging .progress-thumb{width:18px;height:18px;box-shadow:0 0 0 5px rgba(255,80,80,.22)}
.progress-tip{
  position:absolute;bottom:32px;
  background:rgba(10,10,10,.92);color:#fff;
  font-size:12px;font-weight:700;letter-spacing:.02em;
  padding:4px 10px;border-radius:5px;
  pointer-events:none;transform:translateX(-50%);
  white-space:nowrap;display:none;
  box-shadow:0 2px 10px rgba(0,0,0,.55);
  border:1px solid rgba(255,255,255,.08);
}

/* Control row */
.ctrl-row{display:flex;align-items:center;gap:2px}
.ctrl-btn{background:none;border:none;color:#fff;padding:6px;border-radius:4px;display:flex;align-items:center;cursor:pointer;transition:background .15s;flex-shrink:0}
.ctrl-btn:hover{background:rgba(255,255,255,.15)}
.ctrl-btn svg{width:20px;height:20px}
.time-disp{font-size:12px;color:#fff;margin:0 4px;white-space:nowrap;font-variant-numeric:tabular-nums}

/* Volume */
.vol-wrap{display:flex;align-items:center;gap:2px}
.vol-slider-wrap{width:0;overflow:hidden;transition:width .2s}
.vol-wrap:hover .vol-slider-wrap{width:60px}
input[type=range].vol-inp{width:60px;height:4px;-webkit-appearance:none;background:rgba(255,255,255,.4);border-radius:2px;outline:none;cursor:pointer}
input[type=range].vol-inp::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:#fff;border-radius:50%}

/* Speed */
.speed-wrap{position:relative}
.speed-btn{font-size:13px;font-weight:600;padding:4px 8px;letter-spacing:.02em}
.speed-menu{position:absolute;bottom:38px;right:0;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);display:none;min-width:75px;z-index:40;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.6)}
.speed-menu.open{display:block}
.speed-opt{display:block;width:100%;padding:8px 14px;font-size:13px;cursor:pointer;background:none;border:none;color:var(--text);text-align:left;transition:background .15s}
.speed-opt:hover{background:var(--surf)}
.speed-opt.active{color:var(--red);font-weight:700}

/* ── Quality Selector ─────────────────────────────────────────── */
.quality-wrap{position:relative}
.quality-btn{
  font-size:11px;font-weight:700;padding:4px 8px;
  border:1px solid rgba(255,255,255,.3);border-radius:4px;
  letter-spacing:.04em;min-width:40px;justify-content:center;
  gap:3px;
}
.quality-btn svg{width:14px;height:14px;opacity:.8}
.quality-menu{
  position:absolute;bottom:44px;right:0;
  background:#1a1a1a;border:1px solid rgba(255,255,255,.12);
  border-radius:10px;display:none;min-width:160px;z-index:40;
  overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.7);
}
.quality-menu.open{display:block}
.quality-menu-hdr{
  padding:10px 14px 7px;font-size:11px;font-weight:700;
  color:rgba(255,255,255,.4);letter-spacing:.08em;text-transform:uppercase;
  border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;gap:6px;
}
.quality-loading{
  padding:14px;text-align:center;
  color:rgba(255,255,255,.5);font-size:12px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.quality-opt{
  display:flex;align-items:center;
  width:100%;padding:10px 14px;font-size:13px;cursor:pointer;
  background:none;border:none;color:#e0e0e0;text-align:left;
  transition:background .15s;gap:0;
}
.quality-opt:hover{background:rgba(255,255,255,.08)}
.quality-opt.active{color:#fff;font-weight:700;background:rgba(255,0,0,.12)}
.quality-opt-check{width:18px;flex-shrink:0;color:var(--red);font-size:14px}
.quality-opt-label{flex:1;font-weight:600}
.quality-opt-note{font-size:11px;color:rgba(255,255,255,.35);flex-shrink:0;margin-left:6px}
.quality-opt.active .quality-opt-note{color:rgba(255,80,80,.6)}

/* Quality section sub-header */
.quality-section-hdr{
  padding:6px 14px 3px;font-size:10px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;color:rgba(255,255,255,.3);border-top:1px solid rgba(255,255,255,.07);
  margin-top:3px;
}
.quality-section-hdr:first-of-type{border-top:none;margin-top:0}

/* Quality badges */


/* ── Controls visibility logic ────────────────────────────────── */
/* Everything controlled via .controls.force-show (JS only) */
/* Cursor hides in fullscreen when controls are hidden */
:fullscreen .player-wrap:not(.force-ctrl) { cursor: none; }
:-webkit-full-screen .player-wrap:not(.force-ctrl) { cursor: none; }

/* ── Landscape mode class (applied by JS) ─────────────────────── */
.player-wrap.landscape-mode .controls { z-index: 10000; }

/* ── Rotate Button (mobile only) ─────────────────────────────── */
.rotate-btn { display: none !important; }
@media(max-width: 767px) { .rotate-btn { display: flex !important; } }
.rotate-btn.rotated { color: #4caf50; }


/* ── Video Info ───────────────────────────────────────────────── */
.video-info{padding:12px 16px 8px}
@media(min-width:1024px){.video-info{padding:12px 0 8px}}
.v-title{font-size:18px;font-weight:700;line-height:1.4;margin-bottom:8px}
.v-actions{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.v-meta{display:flex;align-items:center;gap:12px;color:var(--text2);font-size:13px;flex-wrap:wrap;margin-bottom:12px}
.v-div{height:1px;background:var(--border);margin:12px 0}
.v-uploader{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.v-up-av{width:44px;height:44px;border-radius:50%;background:var(--red);color:#fff;font-weight:700;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.v-up-av img{width:100%;height:100%;object-fit:cover}
.v-up-name{font-size:15px;font-weight:600;line-height:1.2}
.v-up-sub{font-size:12px;color:var(--text2)}
.v-desc{font-size:14px;color:var(--text2);line-height:1.6;white-space:pre-wrap;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.v-desc.expanded{display:block}
.v-desc-btn{background:none;border:none;color:var(--text);font-size:13px;font-weight:500;padding:6px 0;cursor:pointer}

/* ── Related ──────────────────────────────────────────────────── */
.related-title{font-size:16px;font-weight:700;padding:16px 16px 8px}
@media(min-width:1024px){.related-title{padding:0 0 8px}}
.related-list{display:flex;flex-direction:column;gap:8px;padding:0 16px 24px}
@media(min-width:1024px){.related-list{padding:0}}
.rel-card{display:flex;gap:8px;cursor:pointer;border-radius:var(--r);padding:4px;transition:background .15s;align-items:flex-start}
.rel-card:hover{background:var(--surf2)}
.rel-thumb{position:relative;width:120px;flex-shrink:0;border-radius:6px;overflow:hidden;aspect-ratio:16/9;background:var(--surf2)}
.rel-thumb img{width:100%;height:100%;object-fit:cover}
.rel-dur{position:absolute;bottom:3px;right:3px;background:rgba(0,0,0,.85);color:#fff;font-size:11px;padding:1px 4px;border-radius:3px}
.rel-info{flex:1;overflow:hidden}
.rel-title{font-size:13px;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:3px}
.rel-ch{font-size:12px;color:var(--text2)}
</style>
</head>
<body>

<header class="hdr">
  <a href="index.html" class="logo">AS<span>TUBE</span></a>
  <div class="hdr-search">
    <input id="search-input" type="text" placeholder="Search ASTUBE" autocomplete="off"/>
    <button class="sbtn" onclick="doSearch()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
  </div>
  <div class="hdr-right">
    <div class="backend-status" title="Backend status">
      <span class="backend-dot bk-checking" id="backend-dot"></span>
      <span id="backend-label" class="backend-label-text"></span>
    </div>
    <button id="sign-in-btn" onclick="location.href='login.html'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Sign In
    </button>
    <div id="user-avatar" onclick="location.href='profile.html'"></div>
  </div>
</header>

<div id="offline-banner" style="display:none">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r="1" fill="currentColor"/></svg>
  Termux backend offline — cannot load video. Run <b>bash start.sh</b>.
</div>

<nav class="sidebar">
  <a href="index.html" class="s-link"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home</a>
  <a href="search.html" class="s-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Search</a>
  <a href="add-video.html" class="s-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Add Video</a>
  <a href="profile.html" class="s-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</a>
</nav>

<main class="main">
  <div class="player-page">
    <div class="player-main">

      <!-- ── Video Player ── -->
      <div class="player-wrap" id="player-wrap">
        <video id="vid" preload="auto" playsinline></video>

        <!-- Seek flash - left (rewind) -->
        <div class="seek-flash left" id="flash-left">
          <div class="seek-flash-inner">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M11 17l-5-5 5-5M18 17l-5-5 5-5"/>
            </svg>
            <span>10s</span>
          </div>
        </div>

        <!-- Seek flash - right (forward) -->
        <div class="seek-flash right" id="flash-right">
          <div class="seek-flash-inner">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M13 7l5 5-5 5M6 7l5 5-5 5"/>
            </svg>
            <span>10s</span>
          </div>
        </div>

        <div class="player-loading" id="player-loading">
          <div class="spinner"></div>
          <p id="loading-msg">Fetching video from server…</p>
        </div>

        <div class="player-error" id="player-error">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r="1" fill="currentColor"/>
          </svg>
          <p id="player-error-msg">Could not load video</p>
          <div class="err-actions">
            <button class="btn btn-red" onclick="retryLoad()">Retry</button>
            <a id="yt-link" href="#" target="_blank" rel="noopener" class="btn btn-outline">Open on YouTube</a>
          </div>
        </div>

        <div class="controls" id="controls">

          <!-- ── Title bar ── -->
          <div class="ctrl-title-bar">
            <div class="ctrl-title-text" id="ctrl-title"></div>
          </div>

          <!-- ── Timestamps ── -->
          <div class="ctrl-timestamps">
            <span class="ctrl-ts ctrl-ts-cur" id="ctrl-ts-cur">0:00</span>
            <span class="ctrl-ts ctrl-ts-sep">/</span>
            <span class="ctrl-ts ctrl-ts-total" id="ctrl-ts-total">0:00</span>
          </div>

          <!-- ── Progress bar ── -->
          <div class="progress-bar" id="progress-bar">
            <div class="progress-buf"  id="progress-buf"></div>
            <div class="progress-fill" id="progress-fill"></div>
            <div class="progress-thumb" id="progress-thumb"></div>
            <div class="progress-tip"  id="progress-tip"></div>
          </div>

          <div class="ctrl-row">
            <!-- Play/Pause -->
            <button class="ctrl-btn" onclick="togglePlay()" title="Space">
              <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
            </button>
            <!-- Rewind 10s -->
            <button class="ctrl-btn" onclick="skipAndFlash(-10)" title="← 10s">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                <polyline points="1,4 1,10 7,10"/>
                <path d="M3.51 15a9 9 0 1 0 .49-3.36"/>
                <text x="8" y="16" font-size="4.5" fill="currentColor" stroke="none" font-weight="bold" font-family="sans-serif">10</text>
              </svg>
            </button>
            <!-- Forward 10s -->
            <button class="ctrl-btn" onclick="skipAndFlash(10)" title="→ 10s">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                <polyline points="23,4 23,10 17,10"/>
                <path d="M20.49 15a9 9 0 1 1-.49-3.36"/>
                <text x="8" y="16" font-size="4.5" fill="currentColor" stroke="none" font-weight="bold" font-family="sans-serif">10</text>
              </svg>
            </button>
            <!-- Volume -->
            <div class="vol-wrap">
              <button class="ctrl-btn" onclick="toggleMute()" title="M">
                <svg id="vol-icon" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M11 5L6 9H2v6h4l5 4V5z"/>
                  <path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="currentColor" stroke-width="2" fill="none"/>
                  <path d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke="currentColor" stroke-width="2" fill="none"/>
                </svg>
              </button>
              <div class="vol-slider-wrap">
                <input type="range" class="vol-inp" id="vol-slider" min="0" max="1" step="0.05" value="1" oninput="setVol(this.value)"/>
              </div>
            </div>

            <span style="flex:1"></span>

            <!-- ── Quality Selector ── -->
            <div class="quality-wrap">

<script>
// ================================================================
// ELEMENTS
// ================================================================
const vid   = document.getElementById('vid');
const wrap  = document.getElementById('player-wrap');
const ctrls = document.getElementById('controls');

// ================================================================
// STATE
// ================================================================
let videoId, videoData;
let hideTimer, seeking = false, descExpanded = false, viewTracked = false;
let currentItag = '18';
let currentQualityLabel = '360p';
let availableFormats = [];
let formatsLoaded = false;
let isRotated       = false;
let isManualRotated = false; // true only when CSS rotate() transform is applied
let _loadGen        = 0;     // incremented each load; cancels stale callbacks
let _switching      = false; // suppresses buffering spinner during quality-switch seek

// Start paused-state — show controls immediately so user sees them before video loads
wrap.classList.add('paused');
showCtrl(); // will be defined below — hoisted via function declaration

// ================================================================
// INIT
// ================================================================
async function init() {
  const p = new URLSearchParams(location.search);
  videoId = p.get('v');
  if (!videoId) { location.href = 'index.html'; return; }

  document.getElementById('yt-link').href = `https://youtube.com/watch?v=${videoId}`;

  videoData = await getVideo(videoId);
  if (!videoData) { showError('Video not found in ASTUBE.'); return; }

  document.title = `${videoData.title} - ASTUBE`;
  populateInfo(videoData);
  loadRelated(videoData.category, videoId);
  await loadVideo('18');   // Start at 360p by default
  fetchFormats();          // Background: populate quality menu
}

// ================================================================
// VIDEO LOADING — combined streams (360p / 720p), no MSE needed
// ================================================================
async function loadVideo(itag = '18') {
  const gen       = ++_loadGen;
  currentItag     = itag;
  const isFirst   = !vid.src || (vid.currentTime === 0 && vid.paused && !vid.played.length);
  const prevTime  = vid.currentTime;
  const wasPlaying = !vid.paused && prevTime > 0;

  showLoading(true, isFirst ? 'Loading…' : `Switching to ${currentQualityLabel}…`);
  showPlayerError(false);
  vid.removeEventListener('error', onVidError);   // detach during src swap

  if (!window.BACKEND_URL) {
    if (window._backendReadyPromise) await window._backendReadyPromise;
  }
  if (!window.BACKEND_URL) {
    showError('Termux backend is offline.\nStart it with: bash start.sh');
    return;
  }

  let url;
  try {
    const res = await fetch(`${window.BACKEND_URL}/get-url?ytId=${videoId}&itag=${itag}`);
    if (!res.ok) throw new Error(`Backend ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    if (gen !== _loadGen) return;
    url = data.url;
    // Backend may have fallen back to a different itag
    if (data.itag && data.itag !== itag) {
      currentItag = data.itag;
      const fb = availableFormats.find(f => f.itag === data.itag);
      if (fb) { currentQualityLabel = fb.label; document.getElementById('quality-label').textContent = fb.label; updateQualityMenuActive(); }
    }
  } catch(e) {
    if (gen !== _loadGen) return;
    vid.addEventListener('error', onVidError);
    showError(e.message || 'Failed to load video.');
    return;
  }

  // Swap source
  vid.src = url;
  vid.load();

  // Wait for canplay — use a one-shot listener, NOT the global one
  const onReady = async () => {
    if (gen !== _loadGen) return;   // superseded by newer load
    showLoading(false);
    vid.addEventListener('error', onVidError);

    if (isFirst) {
      // First load: autoplay muted (satisfies browser policy)
      vid.muted = true; vid.volume = 1;
      try {
        await vid.play();
        vid.muted = false;
      } catch {
        vid.muted = false;
        wrap.classList.add('paused');
        showCtrl();
      }
      updateVolIcon();
    } else {
      // Quality switch: restore playback position seamlessly
      // _switching suppresses the 'waiting' event spinner during the seek
      _switching = true;
      vid.currentTime = prevTime;
      if (wasPlaying) {
        vid.play().catch(() => {});
      } else {
        // Even if not playing, need to trigger 'playing' to clear spinner.
        // So play briefly then pause once seeked.
        vid.play().then(() => vid.pause()).catch(() => {});
      }
      setTimeout(() => { _switching = false; }, 1500);
    }
  };

  // Fallback: if canplay never fires (e.g. error), clean up after 15s
  const timeout = setTimeout(() => {
    vid.removeEventListener('canplay', onReady);
    if (gen !== _loadGen) return;
    vid.addEventListener('error', onVidError);
    showLoading(false);
  }, 15000);

  vid.addEventListener('canplay', () => {
    clearTimeout(timeout);
    onReady();
  }, { once: true });
}

// Global video error handler — only active while src is stable
function onVidError() {
  showError('Video playback error. Try retrying.');
}

async function retryLoad() {
  await initBackendUrl();
  await loadVideo(currentItag);
}

// ================================================================
// QUALITY — fetch formats, render menu, handle combined + dash.js HD
// ================================================================

// Globals set by fetchFormats:

async function fetchFormats() {
  if (!window.BACKEND_URL) {
    if (window._backendReadyPromise) await window._backendReadyPromise;
  }
  if (!window.BACKEND_URL) {
    setQualityFallback();   // B9: show fallback if backend never comes online
    return;
  }

  try {
    const res  = await fetch(`${window.BACKEND_URL}/get-formats?ytId=${videoId}`);
    if (!res.ok) { setQualityFallback(); return; }
    const data = await res.json();

    // Response shape: { formats: { combined, default_itag, duration } }
    const inner = data.formats;
    if (!inner) { console.warn('[ASTUBE] no inner formats'); setQualityFallback(); return; }

    const combined = inner.combined || [];
    if (!combined.length) { setQualityFallback(); return; }
    availableFormats = combined;
    formatsLoaded    = true;
    const defItag = inner.default_itag || '18';
    renderQualityMenu(combined, defItag);
  } catch(e) {
    console.warn('fetchFormats failed:', e);
    setQualityFallback();
  }
}

function setQualityFallback() {
  const el = document.getElementById('quality-loading');
  if (el) el.innerHTML =
    '<span style="color:rgba(255,255,255,.4);font-size:12px;padding:10px 14px;display:block">360p only</span>';
}

function renderQualityMenu(combined, defaultItag) {
  const menu = document.getElementById('quality-menu');
  menu.innerHTML = `
    <div class="quality-menu-hdr">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
      </svg>
      Quality
    </div>`;

  const activeItag = currentItag || defaultItag;

  combined.forEach(f => _appendQualityBtn(menu, f, activeItag));

  // Sync button label
  const cur = availableFormats.find(f => f.itag === activeItag);
  if (cur) {
    document.getElementById('quality-label').textContent = cur.label;
    currentQualityLabel = cur.label;
  }
}

function _appendQualityBtn(menu, f, activeItag) {
  const isActive = f.itag === activeItag;

  const badge = ''; // no badges — label alone is clear enough

  let note = '';
  if (f.fps && f.fps > 30)    note = f.fps + 'fps';
  else if (f.filesize > 0)    note = (f.filesize/1024/1024).toFixed(0) + 'MB';

  const btn = document.createElement('button');
  btn.className     = 'quality-opt' + (isActive ? ' active' : '');
  btn.dataset.itag  = f.itag;
  btn.dataset.label = f.label;
  btn.innerHTML = `
    <span class="quality-opt-check">${isActive ? '\u2713' : ''}</span>
    <span class="quality-opt-label">${f.label}${badge}</span>
    <span class="quality-opt-note">${note}</span>
  `;
  btn.onclick = () => selectQuality(f.itag, f.label);
  menu.appendChild(btn);
}

function updateQualityMenuActive() {
  document.querySelectorAll('.quality-opt').forEach(btn => {
    const active = btn.dataset.itag === currentItag;
    btn.classList.toggle('active', active);
    btn.querySelector('.quality-opt-check').textContent = active ? '\u2713' : '';
  });
}

function toggleQualityMenu() {
  document.getElementById('quality-menu').classList.toggle('open');
}

async function selectQuality(itag, label) {
  document.getElementById('quality-menu').classList.remove('open');
  if (itag === currentItag) return;
  currentItag         = itag;
  currentQualityLabel = label;
  document.getElementById('quality-label').textContent = label;
  updateQualityMenuActive();
  await loadVideo(itag);
}

// ================================================================
// POPULATE INFO — shows ASTUBE uploader (not YouTube channel)
// ================================================================
async function populateInfo(v) {
  document.getElementById('video-info').style.display  = 'block';
  document.getElementById('player-side').style.display = 'block';
  document.getElementById('v-title').textContent       = v.title || '';
  // Also set title inside the player controls overlay
  const ctrlTitle = document.getElementById('ctrl-title');
  if (ctrlTitle) ctrlTitle.textContent = v.title || '';
  document.getElementById('v-meta-inline').textContent =
    `${formatCount(v.views)} views · ${v.addedAt ? timeAgo(v.addedAt) : ''}`;

  const desc = v.description || '';
  document.getElementById('v-desc').textContent = desc || 'No description.';
  if (desc.length > 150) document.getElementById('v-desc-btn').style.display = 'block';

  // Show ASTUBE uploader info (NOT YouTube channel name)
  const avEl   = document.getElementById('v-up-av');
  const nameEl = document.getElementById('v-up-name');
  const subEl  = document.getElementById('v-up-sub');

  // Initial render from video record
  nameEl.textContent = v.addedByName || 'ASTUBEr';
  subEl.textContent  = 'ASTUBE member';
  setAvatarEl(avEl, v.addedByPhotoUrl || null, v.addedByName || 'A');

  // Upgrade with full DB profile
  if (v.addedBy) {
    try {
      const uploader = await getUserData(v.addedBy);
      if (uploader) {
        const name = uploader.name || v.addedByName || 'ASTUBEr';
        nameEl.textContent = name;
        setAvatarEl(avEl, uploader.photoUrl || v.addedByPhotoUrl || null, name);
        // Show join date if available
        if (uploader.createdAt) {
          subEl.textContent = `ASTUBE member · joined ${new Date(uploader.createdAt).getFullYear()}`;
        }
      }
    } catch(e) {}
  }
}

async function loadRelated(category, curId) {
  const all  = await loadAllVideos();
  const rel  = all.filter(v => v.id !== curId && v.category === category).slice(0, 15);
  const list = document.getElementById('related-list');
  if (!rel.length) {
    list.innerHTML = `<p style="color:var(--text2);font-size:13px;padding:8px 0">No related videos</p>`;
    return;
  }
  list.innerHTML = rel.map(v => `
    <div class="rel-card" onclick="location.href='player.html?v=${v.id}'">
      <div class="rel-thumb">
        <img src="${v.thumbnail||`https://i.ytimg.com/vi/${v.id}/hqdefault.jpg`}" loading="lazy"
          onerror="this.src='https://i.ytimg.com/vi/${v.id}/hqdefault.jpg'"/>
        <span class="rel-dur">${v.durationFormatted||formatDuration(v.duration)}</span>
      </div>
      <div class="rel-info">
        <p class="rel-title">${v.title||'Untitled'}</p>
        <p class="rel-ch">${v.addedByName||'Unknown'}</p>
      </div>
    </div>`).join('');
}

// ================================================================
// VIDEO EVENTS
// ================================================================
vid.addEventListener('canplay',  () => { /* spinner managed per-load */ });
vid.addEventListener('waiting',  () => { if (!_switching) showLoading(true, 'Buffering…'); });
vid.addEventListener('playing',  () => {
  showLoading(false);
  if (!viewTracked) { viewTracked = true; incrementViews(videoId); addToHistory(videoId); }
});
vid.addEventListener('play', () => {
  setPlayIcon(true);
  wrap.classList.remove('paused');
  // Don't reset timer here — let whatever triggered play (tap) manage the timer
});
vid.addEventListener('pause', () => {
  setPlayIcon(false);
  wrap.classList.add('paused');
  // Don't reset timer — let the existing 3s timer run naturally
  // Controls will hide after 3s just as with any other state
});
vid.addEventListener('ended', () => {
  setPlayIcon(false);
  wrap.classList.add('paused');
  // Video finished — show controls and keep them visible permanently
  clearTimeout(hideTimer);
  ctrls.classList.add('force-show');
});
vid.addEventListener('timeupdate', updateProgress);
vid.addEventListener('progress',   updateBuffer);
vid.addEventListener('error', onVidError);

// ================================================================
// CORE CONTROLS
// ================================================================
function togglePlay() { vid.paused ? vid.play().catch(() => {}) : vid.pause(); }
function skip(s) { vid.currentTime = Math.max(0, Math.min(vid.duration || 0, vid.currentTime + s)); }
function skipAndFlash(s) { skip(s); flashSeek(s < 0 ? -1 : 1); showCtrl(); }
function toggleMute() { vid.muted = !vid.muted; updateVolIcon(); }
function setVol(v) { vid.volume = parseFloat(v); vid.muted = parseFloat(v) === 0; updateVolIcon(); }

function setPlayIcon(playing) {
  document.getElementById('play-icon').innerHTML = playing
    ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    : '<polygon points="5,3 19,12 5,21"/>';
}

function updateVolIcon() {
  const muted = vid.muted || vid.volume === 0;
  document.getElementById('vol-icon').innerHTML = muted
    ? '<path d="M11 5L6 9H2v6h4l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15" stroke="currentColor" stroke-width="2"/><line x1="17" y1="9" x2="23" y2="15" stroke="currentColor" stroke-width="2"/>'
    : '<path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="currentColor" stroke-width="2" fill="none"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke="currentColor" stroke-width="2" fill="none"/>';
  const sl = document.getElementById('vol-slider');
  if (sl) sl.value = muted ? 0 : vid.volume;
}

function updateProgress() {
  if (seeking) return;
  const cur = vid.currentTime || 0;
  const dur = vid.duration    || 0;
  const pct = dur ? (cur / dur) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-thumb').style.left = pct + '%';
  updateTimestamps(cur, dur);
}

function updateTimestamps(cur, dur) {
  const curStr = formatDuration(cur);
  const durStr = formatDuration(dur);
  const tsCur   = document.getElementById('ctrl-ts-cur');
  const tsTotal = document.getElementById('ctrl-ts-total');
  if (tsCur)   tsCur.textContent   = curStr;
  if (tsTotal) tsTotal.textContent = durStr;
  const td = document.getElementById('time-disp');
  if (td) td.textContent = curStr + ' / ' + durStr;
}

function updateBuffer() {
  if (!vid.buffered.length || !vid.duration) return;
  const pct = (vid.buffered.end(vid.buffered.length - 1) / vid.duration) * 100;
  document.getElementById('progress-buf').style.width = pct + '%';
}

// ── Seek bar — mouse + touch drag with live time tooltip ──────────
const pb  = document.getElementById('progress-bar');
const tip = document.getElementById('progress-tip');

function pbFraction(clientX, clientY) {
  const r = pb.getBoundingClientRect();
  // isManualRotated = true when CSS rotate(90deg) is applied.
  // The bar's left→right axis then maps to the screen's top→bottom (inverted).
  if (isManualRotated) {
    return Math.max(0, Math.min(1, 1 - (clientY - r.top) / r.height));
  }
  return Math.max(0, Math.min(1, (clientX - r.left) / r.width));
}

function showTip(frac) {
  const pct = frac * 100;
  tip.style.display = 'block';
  tip.style.left = Math.max(2, Math.min(98, pct)) + '%';
  tip.textContent = formatDuration(frac * (vid.duration || 0));
}

function hideTip() { tip.style.display = 'none'; }

function applyScrub(frac) {
  const pct = frac * 100;
  const dur = vid.duration || 0;
  const cur = frac * dur;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-thumb').style.left  = pct + '%';
  vid.currentTime = cur;
  updateTimestamps(cur, dur);
  showTip(frac);
}

// ── MOUSE ──────────────────────────────────────────────────────────
pb.addEventListener('mouseenter', e => { showCtrl(); showTip(pbFraction(e.clientX, e.clientY)); });
pb.addEventListener('mousemove',  e => { if (!seeking) showTip(pbFraction(e.clientX, e.clientY)); });
pb.addEventListener('mouseleave', () => { if (!seeking) hideTip(); });

pb.addEventListener('mousedown', e => {
  e.preventDefault();
  seeking = true;
  pb.classList.add('dragging');
  showCtrl();
  applyScrub(pbFraction(e.clientX, e.clientY));

  const onMove = ev => applyScrub(pbFraction(ev.clientX, ev.clientY));
  const onUp   = ev => {
    seeking = false;
    pb.classList.remove('dragging');
    applyScrub(pbFraction(ev.clientX, ev.clientY));
    hideTip();
    scheduleHide();
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup',   onUp);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup',   onUp);
});

// ── TOUCH ──────────────────────────────────────────────────────────
pb.addEventListener('touchstart', e => {
  e.preventDefault();
  e.stopPropagation();
  seeking = true;
  pb.classList.add('dragging');
  showCtrl();
  applyScrub(pbFraction(e.touches[0].clientX, e.touches[0].clientY));
}, { passive: false });

pb.addEventListener('touchmove', e => {
  e.preventDefault();
  e.stopPropagation();
  applyScrub(pbFraction(e.touches[0].clientX, e.touches[0].clientY));
}, { passive: false });

pb.addEventListener('touchend', e => {
  e.preventDefault();
  e.stopPropagation();
  seeking = false;
  pb.classList.remove('dragging');
  applyScrub(pbFraction(e.changedTouches[0].clientX, e.changedTouches[0].clientY));
  setTimeout(hideTip, 800);
  scheduleHide();
}, { passive: false });

// ================================================================
// CONTROLS SHOW / HIDE
// ================================================================
// The ONLY way controls become visible is via showCtrl().
// The ONLY way they hide is via the 3s timer in scheduleHide().
// This applies in ALL states: playing, paused, fullscreen, landscape.

function showCtrl() {
  ctrls.classList.add('force-show');
  scheduleHide();
}

function scheduleHide() {
  clearTimeout(hideTimer);
  // Always hide after 3s — even when paused (per spec)
  // Exception: video ended — keep controls visible
  if (vid.ended) return;
  hideTimer = setTimeout(() => {
    ctrls.classList.remove('force-show');
  }, 3000);
}

// NOTE: No mousemove listener — that would reset the timer on every mouse move
// and prevent controls from ever hiding on desktop.

// ================================================================
// SEEK FLASH ANIMATION
// ================================================================
function flashSeek(dir) {
  const el = document.getElementById(dir < 0 ? 'flash-left' : 'flash-right');
  el.classList.add('show');
  clearTimeout(el._hideTimer);
  el._hideTimer = setTimeout(() => el.classList.remove('show'), 650);
}

// ================================================================
// GESTURE — tap behaviour
//
// 1st tap anywhere → show controls + title for 3s, video KEEPS PLAYING
// 2nd tap within 3s:
//   left zone  (<35%) → seek −10s
//   right zone (>65%) → seek +10s
//   center            → play / pause
// Controls always hide after 3s regardless of play state
// ================================================================
let tapCount = 0, tapTimer;

function handleTap(clientX, clientY) {
  // In manual landscape (CSS rotate 90deg), the video's horizontal axis
  // maps to the screen's Y axis — and is inverted (top of screen = right of video).
  // So we must use clientY (inverted) instead of clientX to determine left/right zone.
  let zone;
  if (isRotated && wrap.style.cssText.includes('rotate')) {
    // Screen top → video right, screen bottom → video left
    const rect = wrap.getBoundingClientRect();
    const relY = clientY - rect.top;
    zone = relY / (rect.height || window.innerHeight); // top=forward(right), bottom=rewind(left)
  } else {
    const relX = clientX - wrap.getBoundingClientRect().left;
    zone = relX / (wrap.offsetWidth || 1);
  }

  tapCount++;
  clearTimeout(tapTimer);

  if (tapCount === 1) {
    // 1st tap — show controls only, do NOT play/pause
    showCtrl();
    tapTimer = setTimeout(() => {
      tapCount = 0;
    }, 3000);
  } else {
    // 2nd tap within window — perform action
    tapCount = 0;
    clearTimeout(tapTimer);
    if (zone < 0.35) {
      skipAndFlash(-10);
    } else if (zone > 0.65) {
      skipAndFlash(10);
    } else {
      togglePlay();
      showCtrl();
    }
  }
}

// Desktop clicks on video area (not controls or flash)
wrap.addEventListener('click', e => {
  if (e.target.closest('.controls') || e.target.closest('.seek-flash')) return;
  handleTap(e.clientX, e.clientY);
});

// Mobile touches on video (not controls or flash)
vid.addEventListener('touchend', e => {
  e.preventDefault();
  if (e.target.closest('.controls') || e.target.closest('.seek-flash')) return;
  handleTap(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
});

// ================================================================
// SPEED
// ================================================================
function toggleSpeedMenu() { document.getElementById('speed-menu').classList.toggle('open'); }
function setSpeed(s) {
  vid.playbackRate = s;
  document.getElementById('speed-btn').textContent = s + '×';
  document.querySelectorAll('.speed-opt').forEach(o => o.classList.toggle('active', parseFloat(o.textContent) === s));
  document.getElementById('speed-menu').classList.remove('open');
}

// ================================================================
// FULLSCREEN — works on all devices/screens. Independent of rotate.
// ================================================================
function toggleFs() {
  if (!document.fullscreenElement) {
    wrap.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
}
document.addEventListener('fullscreenchange', () => {
  const isFs = !!document.fullscreenElement;
  document.getElementById('fs-icon').innerHTML = isFs
    ? '<polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/>'
    : '<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>';
  // Show controls briefly then auto-hide if playing
  showCtrl();
});

// ================================================================
// ROTATE — Mobile-only landscape toggle. Fully independent of fullscreen.
// Uses CSS class instead of inline style so controls CSS works properly.
// ================================================================
function toggleRotate() {
  isRotated = !isRotated;
  const btn = document.getElementById('rotate-btn');
  if (isRotated) {
    btn.classList.add('rotated');
    enterLandscape();
  } else {
    btn.classList.remove('rotated');
    exitLandscape();
  }
}

function enterLandscape() {
  // Try the Screen Orientation API first (Android Chrome — cleanest)
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').then(() => {
      // API handled it — device rotated itself, no manual transform needed
      applyLandscapeOverlay();
    }).catch(() => {
      // API unavailable or denied — fall back to CSS transform
      applyManualLandscape();
    });
  } else {
    applyManualLandscape();
  }
}

function applyLandscapeOverlay() {
  // Device rotated itself. Just go fullscreen-like overlay so it fills screen.
  isManualRotated = false;
  wrap.classList.add('landscape-mode');
  document.querySelector('header.hdr')?.style.setProperty('display','none','important');
  document.querySelector('nav.sidebar')?.style.setProperty('display','none','important');
  document.querySelector('nav.bnav')?.style.setProperty('display','none','important');
  document.body.style.overflow = 'hidden';
  showCtrl();
}

function applyManualLandscape() {
  // CSS transform approach — rotate the player element 90deg
  // Use window dimensions at time of press
  const vp = window.visualViewport;
  const vpW = vp ? vp.width  : window.innerWidth;
  const vpH = vp ? vp.height : window.innerHeight;
  // After rotation: our element's width = screen height, height = screen width
  const targetW = Math.max(vpW, vpH);
  const targetH = Math.min(vpW, vpH);

  isManualRotated = true;
  wrap.classList.add('landscape-mode');
  wrap.style.cssText = [
    'position: fixed',
    'top: 0',
    'left: 0',
    `width: ${targetW}px`,
    `height: ${targetH}px`,
    'transform: rotate(90deg) translateY(-100%)',
    'transform-origin: top left',
    'z-index: 9999',
    'aspect-ratio: unset',
    'border-radius: 0',
    'background: #000',
    'overflow: hidden',
  ].join(';');

  document.querySelector('header.hdr')?.style.setProperty('display','none','important');
  document.querySelector('nav.sidebar')?.style.setProperty('display','none','important');
  document.querySelector('nav.bnav')?.style.setProperty('display','none','important');
  document.body.style.overflow = 'hidden';
  showCtrl();
}

function exitLandscape() {
  // Restore
  if (screen.orientation && screen.orientation.unlock) {
    try { screen.orientation.unlock(); } catch(e) {}
  }
  isManualRotated = false;
  wrap.classList.remove('landscape-mode');
  wrap.style.cssText = '';
  document.querySelector('header.hdr')?.style.removeProperty('display');
  document.querySelector('nav.sidebar')?.style.removeProperty('display');
  document.querySelector('nav.bnav')?.style.removeProperty('display');
  document.body.style.overflow = '';
}

// Auto-exit landscape if device physically rotates back
window.addEventListener('orientationchange', () => {
  if (!isRotated) return;
  setTimeout(() => {
    const angle = screen.orientation ? screen.orientation.angle : (window.orientation || 0);
    if (angle === 0 || angle === 180) {
      // Device returned to portrait while we were in landscape
      isRotated = false;
      document.getElementById('rotate-btn').classList.remove('rotated');
      exitLandscape();
    }
  }, 300);
});

// Escape key exits landscape (fullscreen Escape handled by browser natively)
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && isRotated && !document.fullscreenElement) {
    isRotated = false;
    document.getElementById('rotate-btn').classList.remove('rotated');
    exitLandscape();
  }
});

// ================================================================
// PiP
// ================================================================
function togglePip() {
  if (document.pictureInPictureElement) document.exitPictureInPicture();
  else vid.requestPictureInPicture().catch(() => {});
}

// ================================================================
// KEYBOARD
// ================================================================
document.addEventListener('keydown', e => {
  if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) return;
  if (e.key === ' ')           { e.preventDefault(); togglePlay(); }
  if (e.key === 'ArrowLeft')   { skipAndFlash(-10); }
  if (e.key === 'ArrowRight')  { skipAndFlash(10); }
  if (e.key === 'ArrowUp')     { e.preventDefault(); setVol(Math.min(1, vid.volume + 0.1)); }
  if (e.key === 'ArrowDown')   { e.preventDefault(); setVol(Math.max(0, vid.volume - 0.1)); }
  if (e.key.toLowerCase() === 'm') toggleMute();
  if (e.key.toLowerCase() === 'f') toggleFs();
  if (e.key.toLowerCase() === 'p') togglePip();
});

// Close menus on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.speed-wrap'))   document.getElementById('speed-menu').classList.remove('open');
  if (!e.target.closest('.quality-wrap')) document.getElementById('quality-menu').classList.remove('open');
});

// ================================================================
// HELPERS
// ================================================================
function showLoading(v, msg = 'Loading…') {
  document.getElementById('player-loading').style.display = v ? 'flex' : 'none';
  if (msg) document.getElementById('loading-msg').textContent = msg;
}
function showError(msg) {
  showLoading(false);
  document.getElementById('player-error').style.display = 'flex';
  document.getElementById('player-error-msg').textContent = msg;
}
function showPlayerError(v) {
  document.getElementById('player-error').style.display = v ? 'flex' : 'none';
}
function toggleDesc() {
  descExpanded = !descExpanded;
  document.getElementById('v-desc').classList.toggle('expanded', descExpanded);
  document.getElementById('v-desc-btn').textContent = descExpanded ? 'Show less' : 'Show more';
}
function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (q) location.href = `search.html?q=${encodeURIComponent(q)}`;
}
document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

init();
</script>
